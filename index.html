<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Genetic Algorithm TSP Solver</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    max-width: 860px;
    margin: 32px auto;
    padding: 0 16px;
  }
  h1 { font-size: 1.4rem; }
  p.sub { color: #8b949e; margin-top: -8px; }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  #controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; }
  #controls input { width: 90px; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 4px 6px; }
  button {
    background: #238636;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  button#pauseBtn { background: #da3633; }
  button#resetBtn { background: #30363d; }
  #stats { margin: 8px 0 12px; font-size: 0.9rem; color: #8b949e; }
  #stats span { color: #e6edf3; font-weight: 600; }
  canvas { background: #161b22; border: 1px solid #30363d; border-radius: 8px; display: block; margin-bottom: 12px; }
</style>
</head>
<body>
  <h1>Genetic Algorithm TSP Solver</h1>
  <p class="sub">Order crossover + tournament selection + elitism, evolving a route in real time.</p>

  <div id="controls">
    <label>Cities <input id="numCities" type="number" value="40" min="5" max="200" /></label>
    <label>Population <input id="popSize" type="number" value="120" min="10" max="500" /></label>
    <label>Mutation rate <input id="mutRate" type="number" value="0.02" step="0.01" min="0" max="1" /></label>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="stats">Generation: <span id="genCount">0</span> &nbsp;|&nbsp; Best distance: <span id="bestDist">-</span></div>

  <canvas id="mapCanvas" width="800" height="480"></canvas>
  <canvas id="chartCanvas" width="800" height="140"></canvas>

  <script type="module" src="demo.js"></script>
</body>
</html>
